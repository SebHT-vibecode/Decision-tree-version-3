<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Tree Navigator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Interactive evidence pathway</p>
        <h1>Find the right measurement devices for your study.</h1>
        <p class="hero-copy">Answer a few quick questions and explore the best devices for your Therapeutic Area, evidence type, and study purpose.</p>
      </div>
      <div class="hero-card">
        <p><strong>Start with:</strong></p>
        <p class="hero-card-meta">Therapeutic Area → Evidence Type → Use Case → Devices</p>
      </div>
    </header>

    <main id="app" class="main-panel"></main>
  </div>

  <template id="button-template">
    <button class="option-button"></button>
  </template>

  <script src="script.js"></script>
</body>
</html>
